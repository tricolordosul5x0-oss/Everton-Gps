<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everton GPS PRO</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff88;
            --bg: #121212;
            --card: #1e1e1e;
            --accent2: #00c8ff;
            --warn: #ffaa00;
            --danger: #ff4455;
            --card2: #252525;
            --glow: 0 0 18px rgba(0,255,136,0.35);
            --radius: 12px;
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: var(--card);
            padding: 15px;
            border-bottom: 2px solid var(--primary);
            text-align: center;
            margin-bottom: 10px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent2), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .gps-signal {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .gps-signal span {
            width: 4px;
            border-radius: 2px;
            background: #333;
            transition: background 0.4s, height 0.4s;
        }

        .gps-signal span:nth-child(1) { height: 5px; }
        .gps-signal span:nth-child(2) { height: 10px; }
        .gps-signal span:nth-child(3) { height: 15px; }
        .gps-signal span:nth-child(4) { height: 20px; }
        
        .gps-signal.active span { background: var(--primary); animation: pulse-bar 1.4s ease-in-out infinite; }
        .gps-signal.weak span { background: var(--warn); }
        
        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #map {
            height: 320px;
            width: 100%;
            border-radius: 10px;
            background: #1e1e1e;
        }

        .map-wrapper {
            position: relative;
        }

        .map-controls-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .map-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(30,30,30,0.92);
            border: 1px solid rgba(0,255,136,0.3);
            color: var(--primary);
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            backdrop-filter: blur(6px);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 12px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #252525;
            color: white;
            font-size: 1em;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
        }

        button#btnAtualizar {
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00ff88 0%, #00c8ff 100%);
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0,255,136,0.25);
        }

        button#btnAtualizar.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .metric-card {
            background: var(--card2);
            border-radius: var(--radius);
            padding: 12px 14px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 0.68em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Share Tech Mono', monospace;
        }

        .metric-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-unit {
            font-size: 0.65em;
            color: #666;
            font-family: 'Share Tech Mono', monospace;
        }

        .status-box {
            background: #252525;
            padding: 20px 15px 15px 15px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            line-height: 1.8;
            font-size: 1em;
            position: relative;
        }

        .status-label-tag {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--card2);
            padding: 1px 8px;
            font-size: 0.68em;
            color: var(--primary);
            border: 1px solid rgba(0,255,136,0.4);
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .status-dot.warn { background: var(--warn); }
        .status-dot.error { background: var(--danger); }

        .error-log {
            background: #3a1a1a;
            border: 1px solid #ff4444;
            color: #ff9999;
            padding: 10px;
            border-radius: 8px;
            display: none;
            font-size: .85em;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-inner">
            <h2 style="margin:0;font-family:'Rajdhani',sans-serif;letter-spacing:3px;font-size:1.35em">
                🛰️ Everton GPS PRO
            </h2>
            <div class="gps-signal" id="gpsSignal">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>
        <div style="font-size:0.68em;color:#888;font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-top:4px">
            RASTREAMENTO EM TEMPO REAL
        </div>
    </header>

    <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-controls-overlay">
            <button class="map-btn" title="Centralizar" onclick="window.centralizarMapa()">📍</button>
            <button class="map-btn" title="Limpar rota" onclick="window.limparRota()">🗑️</button>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="veiculoID" value="VEICULO-01" placeholder="ID do veículo">

        <button id="btnAtualizar" onclick="window.atualizarLocalizacao()">
            🛰️ ATUALIZAR LOCALIZAÇÃO
        </button>

        <div class="metrics-grid" id="metricsGrid" style="display:none">
            <div class="metric-card">
                <span class="metric-label">Velocidade</span>
                <span class="metric-value" id="mv-vel">0</span>
                <span class="metric-unit">KM/H</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Precisão GPS</span>
                <span class="metric-value" id="mv-acc">—</span>
                <span class="metric-unit">METROS</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Pontos</span>
                <span class="metric-value" id="mv-pts">0</span>
                <span class="metric-unit">REGISTROS</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Atualização</span>
                <span class="metric-value" id="mv-time" style="font-size:1.1em">—</span>
                <span class="metric-unit">HORÁRIO</span>
            </div>
        </div>

        <div class="status-box">
            <span class="status-label-tag">● SISTEMA</span>
            <span class="status-dot" id="statusDot"></span>
            <div id="statusText">Inicializando GPS...</div>
        </div>

        <div id="errorLog" class="error-log"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwKIS8wL3D7OuaysVFWz3D7Oua",
            authDomain: "everton-gps.firebaseapp.com",
            databaseURL: "https://everton-gps-default-rtdb.firebaseio.com",
            projectId: "everton-gps",
            storageBucket: "everton-gps.appspot.com",
            messagingSenderId: "688936933095",
            appId: "1:688936933095:web:5508a8e1008f1b4020a1db",
            measurementId: "G-X14EWTZN18"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const statusText = document.getElementById('statusText');
        const errorLog = document.getElementById('errorLog');

        let map, marcador;
        let historicoRota = [];
        let totalRegistros = 0;
        let linhaRota = null;

        const carroIcone = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        function initMap() {
            map = L.map('map').setView([-23.5505, -46.6333], 16);
            
            // Servidor CARTO (Dark Matter) - Não bloqueia requisições e tem visual Dark incrível
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB © OpenStreetMap',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            marcador = L.marker([-23.5505, -46.6333], { icon: carroIcone }).addTo(map);
        }
        initMap();

        function mostrarErro(origem, mensagem) {
            errorLog.style.display = "block";
            errorLog.innerHTML += `[${origem}] ${mensagem}<br>`;
            document.getElementById('statusDot').className = 'status-dot error';
            document.getElementById('gpsSignal').className = 'gps-signal';
        }

        async function buscarEndereco(lat, lon) {
            try {
                const resposta = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const dados = await resposta.json();
                return {
                    rua: dados.address.road || "Rua não identificada",
                    bairro: dados.address.suburb || dados.address.neighbourhood || "",
                    cidade: dados.address.city || ""
                };
            } catch {
                return { rua: "Posição capturada", bairro: "", cidade: "" };
            }
        }

        async function enviarDadosParaFirebase(dados) {
            try {
                const vID = document.getElementById('veiculoID').value || "VEICULO-01";
                statusText.innerHTML = "📡 Buscando endereço...";

                const endereco = await buscarEndereco(dados.lat, dados.lon);
                dados.endereco = endereco;

                await set(ref(db, `veiculos/${vID}/atual`), dados);
                await push(ref(db, `veiculos/${vID}/historico`), dados);

                const pos = [dados.lat, dados.lon];
                historicoRota.push(pos);
                if (historicoRota.length > 50) historicoRota.shift();

                marcador.setLatLng(pos);
                map.flyTo(pos, 17);

                if (linhaRota) map.removeLayer(linhaRota);
                linhaRota = L.polyline(historicoRota, { color: '#00ff88', weight: 5, opacity: 0.8 }).addTo(map);

                marcador.bindPopup(`<b>${vID}</b><br>📍 ${endereco.rua}<br>🚗 ${dados.velocidade} km/h`).openPopup();

                statusText.innerHTML = `✅ Transmitindo Prontamente!<br>📍 ${endereco.rua}<br>🚗 ${dados.velocidade} km/h | 🎯 Precisão: ${dados.acuracia}m`;

                totalRegistros++;
                document.getElementById('metricsGrid').style.display = 'grid';
                document.getElementById('mv-vel').textContent = dados.velocidade;
                document.getElementById('mv-acc').textContent = dados.acuracia;
                document.getElementById('mv-pts').textContent = totalRegistros;
                document.getElementById('mv-time').textContent = dados.hora;

                document.getElementById('statusDot').className = 'status-dot active';
                
                const sig = document.getElementById('gpsSignal');
                sig.className = 'gps-signal';
                if (Number(dados.acuracia) <= 40) {
                    sig.classList.add('active');
                } else {
                    sig.classList.add('weak');
                }

            } catch (e) {
                mostrarErro("Firebase", e.message);
            }
        }

        window.atualizarLocalizacao = function () {
            const btn = document.getElementById('btnAtualizar');
            if (btn) btn.classList.add('loading');

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    if (btn) btn.classList.remove('loading');

                    const dadosGPS = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        hora: new Date().toLocaleTimeString(),
                        timestamp: Date.now(),
                        acuracia: Number(pos.coords.accuracy).toFixed(1),
                        velocidade: pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0
                    };

                    await enviarDadosParaFirebase(dadosGPS);
                },
                (err) => {
                    if (btn) btn.classList.remove('loading');
                    statusText.innerHTML = "❌ Erro de permissão: Vá nas configurações do seu celular e mude as Permissões deste App para permitir 'Localização'.";
                    mostrarErro("GPS", "Bloqueado pelo sistema operacional do celular.");
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 5000, 
                    timeout: 15000     
                }
            );
        };

        window.centralizarMapa = function() {
            if (historicoRota.length > 0) {
                map.flyTo(historicoRota[historicoRota.length - 1], 17);
            }
        };

        window.window.limparRota = function() {
            historicoRota = [];
            if (linhaRota) map.removeLayer(linhaRota);
            statusText.innerHTML = "Histórico de tela limpo.";
        };

        setInterval(window.atualizarLocalizacao, 10000); // 10s para estabilizar tráfego mobile
        window.atualizarLocalizacao();
    </script>
</body>
</html>
