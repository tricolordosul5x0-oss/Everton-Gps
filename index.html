<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Everton GPS PRO</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>

:root{
    --primary:#00ff88;
    --bg:#121212;
    --card:#1e1e1e;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg);
    color:white;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

header{
    background:var(--card);
    padding:15px;
    border-bottom:2px solid var(--primary);
    text-align:center;
    margin-bottom:10px;
    border-radius:10px;
}

#map{
    height:320px;
    width:100%;
    border-radius:10px;
}

.controls{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#252525;
    color:white;
    font-size:1em;
}

button{
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:1em;
}

.status-box{
    background:#252525;
    padding:15px;
    border-radius:8px;
    border:1px solid #333;
    line-height:1.8;
    font-size:1em;
}

.error-log{
    background:#3a1a1a;
    border:1px solid #ff4444;
    color:#ff9999;
    padding:10px;
    border-radius:8px;
    display:none;
    font-size:.85em;
    font-family:monospace;
}

.leaflet-routing-container{
    display:none !important;
}

</style>

</head>

<body>

<header>

<h2 style="margin:0">
🛰️ Everton GPS PRO
</h2>

</header>

<div id="map"></div>

<div class="controls">

<input
type="text"
id="veiculoID"
value="VEICULO-01"
placeholder="ID do veículo">

<button onclick="window.atualizarLocalizacao()">

ATUALIZAR LOCALIZAÇÃO

</button>

<div class="status-box">

<strong>Status:</strong>

<div id="statusText">

Inicializando GPS...

</div>

</div>

<div id="errorLog"
class="error-log"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    push
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// FIREBASE REAL
const firebaseConfig = {

    apiKey:
    "AIzaSyDwKIS8wL3D7OuaysVFWz3D7Oua",

    authDomain:
    "everton-gps.firebaseapp.com",

    databaseURL:
    "https://everton-gps-default-rtdb.firebaseio.com",

    projectId:
    "everton-gps",

    storageBucket:
    "everton-gps.appspot.com",

    messagingSenderId:
    "688936933095",

    appId:
    "1:688936933095:web:5508a8e1008f1b4020a1db",

    measurementId:
    "G-X14EWTZN18"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const statusText =
document.getElementById('statusText');

const errorLog =
document.getElementById('errorLog');

function mostrarErro(origem,mensagem){

    errorLog.style.display = "block";

    errorLog.innerHTML += `
    [${origem}] ${mensagem}<br>
    `;

    console.error(origem,mensagem);
}

// ================= MAPA =================

let map;

let marcador;

let controleRota;

let historicoRota = [];

const carroIcone = L.icon({

    iconUrl:
    'https://cdn-icons-png.flaticon.com/512/744/744465.png',

    iconSize:[40,40],

    iconAnchor:[20,20]
});

function initMap(){

    map = L.map('map').setView(
        [-23.5505,-46.6333],
        18
    );

    // MAPA SEM BLOQUEIO
    L.tileLayer(
    'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap',
        maxZoom:20
    }).addTo(map);

    marcador = L.marker(
        [-23.5505,-46.6333],
        {
            icon:carroIcone
        }
    ).addTo(map);
}

initMap();

// ================= DISTÂNCIA =================

function distanciaMetros(
lat1, lon1,
lat2, lon2
){

    const R = 6371e3;

    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;

    const Δφ =
    (lat2-lat1) * Math.PI/180;

    const Δλ =
    (lon2-lon1) * Math.PI/180;

    const a =

    Math.sin(Δφ/2) *
    Math.sin(Δφ/2)

    +

    Math.cos(φ1) *
    Math.cos(φ2)

    *

    Math.sin(Δλ/2) *
    Math.sin(Δλ/2);

    const c =
    2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R*c;
}

// ================= ROTA REAL =================

async function desenharRotaReal(){

    try{

        if(historicoRota.length < 2)
            return;

        if(controleRota){

            map.removeControl(
                controleRota
            );
        }

        const waypoints =
        historicoRota.map(p=>

            L.latLng(
                p.lat,
                p.lon
            )
        );

        controleRota =
        L.Routing.control({

            waypoints,

            addWaypoints:false,

            draggableWaypoints:false,

            fitSelectedRoutes:false,

            show:false,

            createMarker:()=>null,

            router:
            L.Routing.osrmv1({

                serviceUrl:
                'https://router.project-osrm.org/route/v1'
            }),

            lineOptions:{

                styles:[{

                    color:'#00ff88',

                    opacity:0.9,

                    weight:6
                }]
            }

        }).addTo(map);

    }catch(e){

        mostrarErro(
            "Rota",
            e.message
        );
    }
}

// ================= ENDEREÇO =================

async function buscarEndereco(lat, lon){

    try{

        const resposta =
        await fetch(

        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`

        );

        const dados =
        await resposta.json();

        return {

            rua:
            dados.address.road || "",

            bairro:
            dados.address.suburb ||

            dados.address.neighbourhood ||

            "",

            cidade:
            dados.address.city ||

            dados.address.town ||

            dados.address.village ||

            "",

            estado:
            dados.address.state || "",

            local:
            dados.name ||

            dados.display_name ||

            "",

            completo:
            dados.display_name || ""
        };

    }catch(e){

        mostrarErro(
            "Endereço",
            e.message
        );

        return {

            rua:"-",
            bairro:"-",
            cidade:"-",
            estado:"-",
            local:"-",
            completo:"-"
        };
    }
}

// ================= FIREBASE =================

async function enviarDadosParaFirebase(dados){

    try{

        const vID =
        document.getElementById(
            'veiculoID'
        ).value || "VEICULO-01";

        const ultimo =
        historicoRota[
            historicoRota.length-1
        ];

        if(ultimo){

            const distancia =
            distanciaMetros(

                ultimo.lat,
                ultimo.lon,

                dados.lat,
                dados.lon
            );

            if(distancia > 500){

                return;
            }
        }

        statusText.innerHTML =
        "📡 Buscando endereço...";

        const endereco =
        await buscarEndereco(
            dados.lat,
            dados.lon
        );

        dados.endereco = endereco;

        await set(
            ref(
                db,
                `veiculos/${vID}/atual`
            ),
            dados
        );

        await push(
            ref(
                db,
                `veiculos/${vID}/historico`
            ),
            dados
        );

        historicoRota.push({

            lat:dados.lat,
            lon:dados.lon
        });

        if(historicoRota.length > 50){

            historicoRota.shift();
        }

        await desenharRotaReal();

        const pos = [
            dados.lat,
            dados.lon
        ];

        marcador.setLatLng(pos);

        // CENTRALIZA COM ZOOM
        map.flyTo(pos, 19);

        marcador.bindPopup(`

        <b>${vID}</b><br>

        📍 ${endereco.rua}<br>

        🏘️ ${endereco.bairro}<br>

        🏙️ ${endereco.cidade}<br>

        🚗 ${dados.velocidade} km/h

        `);

        statusText.innerHTML = `

        ✅ Transmitindo<br><br>

        📍 ${endereco.rua}<br>

        🏘️ ${endereco.bairro}<br>

        🏙️ ${endereco.cidade}<br>

        🚗 ${dados.velocidade} km/h<br>

        🎯 Precisão:
        ${dados.acuracia}m

        `;

    }catch(e){

        mostrarErro(
            "Firebase",
            e.message
        );
    }
}

// ================= GPS REAL =================

window.atualizarLocalizacao =
function(){

navigator.geolocation.getCurrentPosition(

async(pos)=>{

    if(pos.coords.accuracy > 30){

        statusText.innerHTML =
        "⚠️ GPS fraco. Aguarde sinal melhor.";

        return;
    }

    const dadosGPS = {

        lat:
        pos.coords.latitude,

        lon:
        pos.coords.longitude,

        hora:
        new Date()
        .toLocaleTimeString(),

        timestamp:
        Date.now(),

        acuracia:
        Number(
            pos.coords.accuracy
        ).toFixed(1),

        velocidade:

        pos.coords.speed ?

        (
            pos.coords.speed * 3.6
        ).toFixed(0)

        : 0
    };

    await enviarDadosParaFirebase(
        dadosGPS
    );

},

(err)=>{

    mostrarErro(
        "GPS",
        err.message
    );

},

{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:30000
});

};

// atualiza automático
setInterval(()=>{

    atualizarLocalizacao();

},5000);

// inicia
window.atualizarLocalizacao();

</script>

</body>
</html>
