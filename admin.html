<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Everton GPS - Painel Admin</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>

:root{
    --primary:#00bcd4;
    --bg:#121212;
    --card:#1e1e1e;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:var(--card);
    padding:15px;
    border-bottom:2px solid var(--primary);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.2em;
    font-weight:bold;
}

#map{
    flex-grow:1;
    width:100%;
}

.painel{

    background:var(--card);

    padding:15px;

    display:grid;

    grid-template-columns:
    1fr 1.5fr;

    gap:15px;

    height:300px;

    overflow:auto;
}

.card{

    background:#252525;

    padding:15px;

    border-radius:10px;
}

.info{

    display:flex;

    justify-content:space-between;

    margin-bottom:10px;

    border-bottom:1px solid #333;

    padding-bottom:5px;

    font-size:.9em;
}

.badge{

    background:#4caf50;

    padding:3px 10px;

    border-radius:20px;
}

.badge.off{

    background:#f44336;
}

table{

    width:100%;

    border-collapse:collapse;

    font-size:.85em;
}

th,td{

    padding:10px;

    border-bottom:1px solid #333;
}

th{

    color:var(--primary);

    background:#151515;

    position:sticky;

    top:0;
}

.leaflet-routing-container{

    display:none !important;
}

@media(max-width:700px){

    .painel{

        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
🖥️ Everton GPS - Admin
</div>

<select id="seletorVeiculo"
style="
padding:10px;
background:#222;
color:white;
border:1px solid var(--primary);
border-radius:5px;
">

<option value="VEICULO-01">
VEICULO-01
</option>

</select>

</header>

<div id="map"></div>

<div class="painel">

<div class="card">

<h3 style="margin-top:0;color:#00bcd4">
Status
</h3>

<div class="info">
<span>Veículo:</span>
<span id="info-id">
VEICULO-01
</span>
</div>

<div class="info">
<span>Status:</span>
<span id="info-conexao"
class="badge off">
Offline
</span>
</div>

<div class="info">
<span>Velocidade:</span>
<span id="info-vel">
0 km/h
</span>
</div>

<div class="info">
<span>Precisão:</span>
<span id="info-precisao">
-
</span>
</div>

<div class="info">
<span>Última atualização:</span>
<span id="info-hora">
-
</span>
</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Horário</th>

<th>Local</th>

<th>Vel.</th>

</tr>

</thead>

<tbody id="tabela-admin-corpo">

<tr>

<td colspan="3"
style="text-align:center;color:#777">

Aguardando dados...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    query,
    limitToLast
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {

    apiKey:
    "AIzaSyDwKIS8wL3D7OuaysVFWz3D7Oua",

    authDomain:
    "everton-gps.firebaseapp.com",

    databaseURL:
    "https://everton-gps-default-rtdb.firebaseio.com",

    projectId:
    "everton-gps",

    storageBucket:
    "everton-gps.appspot.com",

    messagingSenderId:
    "688936933095",

    appId:
    "1:688936933095:web:5508a8e1008f1b4020a1db",

    measurementId:
    "G-X14EWTZN18"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

let map;
let marcadorVeiculo;
let controleRota;

function initMap(){

    map = L.map('map').setView(
        [-23.5505,-46.6333],
        14
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);
}

initMap();

async function desenharRotaReal(listaPontos){

    try{

        if(controleRota){

            map.removeControl(
                controleRota
            );
        }

        const waypoints =
        listaPontos.map(p=>

            L.latLng(
                p.lat,
                p.lon
            )
        );

        controleRota =
        L.Routing.control({

            waypoints:waypoints,

            router:
            L.Routing.osrmv1({

                serviceUrl:
                'https://router.project-osrm.org/route/v1'
            }),

            addWaypoints:false,

            draggableWaypoints:false,

            fitSelectedRoutes:true,

            routeWhileDragging:false,

            show:false,

            createMarker:()=>null,

            lineOptions:{

                styles:[{

                    color:'#00bcd4',

                    opacity:0.9,

                    weight:5
                }]
            }

        }).addTo(map);

    }catch(e){

        console.log(e);
    }
}

function monitorarVeiculo(idVeiculo){

    document.getElementById(
        'info-id'
    ).innerText = idVeiculo;

    const atualRef =
    ref(
        db,
        `veiculos/${idVeiculo}/atual`
    );

    onValue(atualRef,(snapshot)=>{

        const dados =
        snapshot.val();

        if(dados){

            const pos = [
                dados.lat,
                dados.lon
            ];

            const vel =
            dados.velocidade || 0;

            if(!marcadorVeiculo){

                marcadorVeiculo =
                L.marker(pos)
                .addTo(map);

            }else{

                marcadorVeiculo
                .setLatLng(pos);
            }

            marcadorVeiculo
            .bindPopup(`

                <b>${idVeiculo}</b><br>

                📍 ${
                    dados.endereco?.local ||
                    dados.endereco?.rua ||
                    "-"
                }<br>

                🏙️ ${
                    dados.endereco?.cidade ||
                    "-"
                }<br>

                🚗 ${vel} km/h

            `);

            document.getElementById(
                'info-conexao'
            ).innerText = "Online";

            document.getElementById(
                'info-conexao'
            ).className = "badge";

            document.getElementById(
                'info-hora'
            ).innerText =
            dados.hora || "-";

            document.getElementById(
                'info-vel'
            ).innerText =
            vel + " km/h";

            document.getElementById(
                'info-precisao'
            ).innerText =
            dados.acuracia + "m";

            map.panTo(pos);
        }
    });

    const historicoRef =
    query(
        ref(
            db,
            `veiculos/${idVeiculo}/historico`
        ),
        limitToLast(100)
    );

    onValue(historicoRef,
    async(snapshot)=>{

        const dados =
        snapshot.val();

        if(dados){

            const listaPontos =
            Object.values(dados)

            .sort((a,b)=>

                a.timestamp -
                b.timestamp
            );

            // rota real
            await desenharRotaReal(
                listaPontos
            );

            // últimos 10 locais
            const ultimos10 =
            [...listaPontos]

            .reverse()

            .slice(0,10);

            const tabela =
            document.getElementById(
                'tabela-admin-corpo'
            );

            tabela.innerHTML =
            ultimos10.map(p=>`

                <tr>

                    <td>
                        ${p.hora || "-"}
                    </td>

                    <td>

                        <b>

                        📍 ${
                            p.endereco?.local ||

                            p.endereco?.rua ||

                            "Local desconhecido"
                        }

                        </b>

                        <br>

                        <small>

                        🏙️ ${
                            p.endereco?.bairro ||
                            ""
                        }

                        - ${
                            p.endereco?.cidade ||
                            ""
                        }

                        </small>

                    </td>

                    <td
                    style="
                    color:#00bcd4;
                    font-weight:bold;
                    ">

                    ${
                        p.velocidade || 0
                    } km/h

                    </td>

                </tr>

            `).join('');
        }
    });
}

window.addEventListener(
'DOMContentLoaded',()=>{

    const seletor =
    document.getElementById(
        'seletorVeiculo'
    );

    monitorarVeiculo(
        seletor.value
    );
});

</script>

</body>

</html>
