window.mudarAba = function(nome, btn){
    document.querySelectorAll('.conteudo-aba')
        .forEach(el=>el.classList.remove('visivel'));
    document.querySelectorAll('.aba')
        .forEach(el=>el.classList.remove('ativa'));
    document.getElementById('aba-'+nome)
        .classList.add('visivel');
    btn.classList.add('ativa');
};

// ═══════════════════════════════════════════
// FILA OFFLINE — salvar / carregar / sincronizar
// ═══════════════════════════════════════════

function carregarFilaOffline(){
    try{
        return JSON.parse(
            localStorage.getItem(CHAVE_OFFLINE) || '[]'
        );
    }catch(e){ return []; }
}

function salvarFilaOffline(fila){
    localStorage.setItem(
        CHAVE_OFFLINE,
        JSON.stringify(fila)
    );
}

function adicionarPontoOffline(ponto){
    const fila = carregarFilaOffline();
    // evitar duplicatas pelo timestamp
    if(!fila.find(p=>p.timestamp===ponto.timestamp)){
        fila.push({...ponto, _sincronizado:false});
        salvarFilaOffline(fila);
    }
    atualizarIndicadorOffline();
    renderizarListaOffline();
}

function atualizarIndicadorOffline(){
    const fila = carregarFilaOffline();
    const pendentes = fila.filter(p=>!p._sincronizado);
    const ind = document.getElementById('indicadorOffline');
    const qtd = document.getElementById('qtdOffline');
    if(pendentes.length > 0){
        ind.style.display = 'inline-block';
        qtd.textContent = pendentes.length;
    }else{
        ind.style.display = 'none';
    }
}

async function sincronizarFilaOffline(idVeiculo){
    const fila = carregarFilaOffline();
    let alterou = false;

    for(let i=0; i<fila.length; i++){
        if(fila[i]._sincronizado) continue;
        try{
            const novoRef = push(
                ref(db,`veiculos/${idVeiculo}/historico`)
            );
            const payload = {...fila[i]};
            delete payload._sincronizado;
            await set(novoRef, payload);
            fila[i]._sincronizado = true;
            alterou = true;
        }catch(e){
            // sem conexão, tenta na próxima vez
            break;
        }
    }

    if(alterou){
        salvarFilaOffline(fila);
        atualizarIndicadorOffline();
        renderizarListaOffline();
    }
}

function renderizarListaOffline(){
    const fila = carregarFilaOffline();
    const lista = document.getElementById('lista-offline');

    if(!fila.length){
        lista.innerHTML =
        '<p style="color:#777;text-align:center;margin-top:20px">Nenhum registro offline pendente.</p>';
        return;
    }

    // mostra mais recentes primeiro
    const itens = [...fila].reverse();

    lista.innerHTML = itens.map(p=>`
        <div class="offline-item">
            <div>
                <b>${p.hora || new Date(p.timestamp).toLocaleTimeString('pt-BR')}</b>
                ${p._sincronizado
                    ? '<span class="status-sync">✅ Sincronizado</span>'
                    : '<span style="color:#ff5722;font-size:.75em">⏳ Pendente</span>'}
            </div>
            <div style="margin-top:4px;color:#ccc">
                📍 ${p.endereco?.rua || p.endereco?.local || 'Local desconhecido'}<br>
                🏘️ ${p.endereco?.bairro || ''} &nbsp;
                🏙️ ${p.endereco?.cidade || ''}
            </div>
            <div style="margin-top:4px;color:#aaa">
                🚗 ${p.velocidade || 0} km/h &nbsp;|&nbsp;
                🛰️ ${p.acuracia || '-'}m
            </div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════════
// DETECTAR PARADAS
// ═══════════════════════════════════════════

// Uma "parada" = sequência de pontos onde
// a velocidade < 5 km/h por >= 2 minutos
// e dentro de raio de 50m entre si

function detectarParadas(pontos){
    const paradas = [];
    const VEL_PARADA = 5;         // km/h
    const TEMPO_MIN  = 2 * 60000; // 2 min em ms
    const RAIO_MAX   = 50;        // metros

    let grupoInicio = null;
    let grupoUlt   = null;
    let grupoCentro = null;

    for(let i=0; i<pontos.length; i++){
        const p = pontos[i];
        const parado = (p.velocidade || 0) < VEL_PARADA;

        if(parado){
            if(!grupoInicio){
                grupoInicio = p;
                grupoUlt   = p;
                grupoCentro = { lat: p.lat, lon: p.lon };
            }else{
                const dist = distanciaMetros(
                    grupoCentro.lat, grupoCentro.lon,
                    p.lat, p.lon
                );
                if(dist <= RAIO_MAX){
                    grupoUlt = p;
                }else{
                    // saiu do raio: finaliza grupo anterior, inicia novo
                    const dur = grupoUlt.timestamp - grupoInicio.timestamp;
                    if(dur >= TEMPO_MIN){
                        paradas.push({
                            inicio: grupoInicio,
                            fim:    grupoUlt,
                            duracao: dur,
                            lat: grupoCentro.lat,
                            lon: grupoCentro.lon
                        });
                    }
                    grupoInicio = p;
                    grupoUlt   = p;
                    grupoCentro = { lat: p.lat, lon: p.lon };
                }
            }
        }else{
            if(grupoInicio && grupoUlt){
                const dur = grupoUlt.timestamp - grupoInicio.timestamp;
                if(dur >= TEMPO_MIN){
                    paradas.push({
                        inicio: grupoInicio,
                        fim:    grupoUlt,
                        duracao: dur,
                        lat: grupoCentro.lat,
                        lon: grupoCentro.lon
                    });
                }
            }
            grupoInicio = null;
            grupoUlt   = null;
            grupoCentro = null;
        }
    }

    // fechar grupo no final se ainda aberto
    if(grupoInicio && grupoUlt){
        const dur = grupoUlt.timestamp - grupoInicio.timestamp;
        if(dur >= TEMPO_MIN){
            paradas.push({
                inicio: grupoInicio,
                fim:    grupoUlt,
                duracao: dur,
                lat: grupoCentro.lat,
                lon: grupoCentro.lon
            });
        }
    }

    return paradas;
}

function formatarDuracao(ms){
    const s = Math.round(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if(h > 0) return `${h}h ${m}min`;
    return `${m} min`;
}

function renderizarParadas(paradas){
    // limpa marcadores antigos
    marcadoresParada.forEach(m=>m.remove());
    marcadoresParada = [];

    const lista = document.getElementById('lista-paradas');

    if(!paradas.length){
        lista.innerHTML =
        '<p style="color:#777;text-align:center;margin-top:20px">Nenhuma parada detectada hoje.</p>';
        return;
    }

    // mais recentes primeiro
    const ordenadas = [...paradas].reverse();

    lista.innerHTML = ordenadas.map((p,i)=>`
        <div class="parada-item">
            <div>
                🅿️ <b>Parada ${paradas.length - i}</b>
                &nbsp;
                <span class="dur">${formatarDuracao(p.duracao)}</span>
            </div>
            <div style="margin-top:5px;color:#ccc;font-size:.8em">
                📍 ${p.inicio.endereco?.rua || p.inicio.endereco?.local || 'Local desconhecido'}<br>
                🏘️ ${p.inicio.endereco?.bairro || ''} &nbsp;
                🏙️ ${p.inicio.endereco?.cidade || ''}
            </div>
            <div style="margin-top:4px;color:#aaa;font-size:.78em">
                🕐 ${p.inicio.hora || '-'} → ${p.fim.hora || '-'}
            </div>
        </div>
    `).join('');

    // adiciona marcadores no mapa
    paradas.forEach((p,i)=>{
        const m = L.marker(
            [p.lat, p.lon],
            { icon: paradaIcone }
        ).addTo(map);

        m.bindPopup(`
            <div class="popup-info">
            🅿️ <b>Parada ${i+1}</b><br><br>
            📍 ${p.inicio.endereco?.rua || 'Local desconhecido'}<br>
            🏘️ ${p.inicio.endereco?.bairro || ''}<br>
            🏙️ ${p.inicio.endereco?.cidade || ''}<br><br>
            ⏱️ <b>Duração:</b> ${formatarDuracao(p.duracao)}<br>
            🕐 ${p.inicio.hora || '-'} → ${p.fim.hora || '-'}
            </div>
        `);

        marcadoresParada.push(m);
    });
}

// ═══════════════════════════════════════════
// LÓGICA ORIGINAL — intacta
// ═══════════════════════════════════════════

function distanciaMetros(
lat1,lon1,
lat2,lon2){

    const R = 6371e3;

    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;

    const Δφ =
    (lat2-lat1) * Math.PI/180;

    const Δλ =
    (lon2-lon1) * Math.PI/180;

    const a =

    Math.sin(Δφ/2) *
    Math.sin(Δφ/2)

    +

    Math.cos(φ1) *
    Math.cos(φ2)

    *

    Math.sin(Δλ/2) *
    Math.sin(Δλ/2);

    const c =

    2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R*c;
}

async function desenharLinhaTempoReal(listaPontos){

    if(listaPontos.length < 2)
        return;

    try{

        const pontosReduzidos =
        listaPontos.filter((_,i)=>

            i % 5 === 0 ||

            i === listaPontos.length-1
        );

        const coordenadas =
        pontosReduzidos.map(p=>

            `${p.lon},${p.lat}`
        ).join(';');

        const url =

        `https://router.project-osrm.org/route/v1/driving/${coordenadas}?overview=full&geometries=geojson`;

        const resposta =
        await fetch(url);

        const dados =
        await resposta.json();

        if(
            !dados.routes ||
            !dados.routes.length
        ) return;

        const rota =
        dados.routes[0]
        .geometry.coordinates;

        const latlngs =
        rota.map(c=>[
            c[1],
            c[0]
        ]);

        ultimaRota = latlngs;

        if(linhaPercurso){

            linhaPercurso.setLatLngs(
                latlngs
            );

        }else{

            linhaPercurso =
            L.polyline(latlngs,{

                color:'#00ff00',

                weight:6,

                opacity:1,

                smoothFactor:1

            }).addTo(map);
        }

    }catch(e){

        console.log(
            "Erro rota:",
            e
        );

        if(
            ultimaRota.length &&
            linhaPercurso
        ){

            linhaPercurso.setLatLngs(
                ultimaRota
            );
        }
    }
}

function monitorarVeiculo(idVeiculo){

    document.getElementById(
        'info-id'
    ).innerText = idVeiculo;

    const atualRef =
    ref(
        db,
        `veiculos/${idVeiculo}/atual`
    );

    onValue(atualRef,
    (snapshot)=>{

        const dados =
        snapshot.val();

        if(!dados) return;

        const pos = [
            dados.lat,
            dados.lon
        ];

        if(!marcadorVeiculo){

            marcadorVeiculo =
            L.marker(pos,{
                icon:carroIcone
            }).addTo(map);

        }else{

            marcadorVeiculo
            .setLatLng(pos);
        }

        marcadorVeiculo.bindPopup(`

        <div class="popup-info">

        🚗 <b>${idVeiculo}</b><br><br>

        📍 <b>Rua:</b>
        ${
            dados.endereco?.rua ||
            "Não identificada"
        }<br>

        🏘️ <b>Bairro:</b>
        ${
            dados.endereco?.bairro ||
            "-"
        }<br>

        🏙️ <b>Cidade:</b>
        ${
            dados.endereco?.cidade ||
            "-"
        }<br><br>

        🚗 <b>Velocidade:</b>
        ${
            dados.velocidade || 0
        } km/h<br>

        🛰️ <b>Precisão:</b>
        ${
            dados.acuracia || "-"
        }m

        </div>

        `);

        document.getElementById(
            'info-conexao'
        ).innerText = "Online";

        document.getElementById(
            'info-conexao'
        ).className = "badge";

        document.getElementById(
            'info-hora'
        ).innerText =
        dados.hora || "-";

        document.getElementById(
            'info-vel'
        ).innerText =
        (dados.velocidade || 0)
        + " km/h";

        document.getElementById(
            'info-precisao'
        ).innerText =
        dados.acuracia + "m";

        map.flyTo(pos, 17, {
            duration:1.5
        });

        // ── Tenta sincronizar fila offline a cada atualização ──
        sincronizarFilaOffline(idVeiculo);
    });

    const historicoRef =
    query(
        ref(
            db,
            `veiculos/${idVeiculo}/historico`
        ),
        limitToLast(2000)
    );

    onValue(historicoRef,
    async(snapshot)=>{

        const dados =
        snapshot.val();

        if(!dados) return;

        const agora = Date.now();

        let listaPontos =

        Object.values(dados)

        .filter(p =>

            agora - p.timestamp
            <= 86400000
        )

        .sort((a,b)=>

            a.timestamp -
            b.timestamp
        );

        const pontosFiltrados = [];

        for(
            let i=0;
            i<listaPontos.length;
            i++
        ){

            const atual =
            listaPontos[i];

            const anterior =
            listaPontos[i-1];

            if(!anterior){

                pontosFiltrados.push(atual);
                continue;
            }

            const distancia =
            distanciaMetros(

                anterior.lat,
                anterior.lon,

                atual.lat,
                atual.lon
            );

            if(
                distancia < 120
            ){

                pontosFiltrados.push(atual);
            }
        }

        await desenharLinhaTempoReal(
            pontosFiltrados
        );

        // ── DETECTAR E RENDERIZAR PARADAS ──
        const paradas = detectarParadas(listaPontos);
        renderizarParadas(paradas);

        const ultimos10 =
        [...listaPontos]

        .reverse()

        .slice(0,10);

        const tabela =
        document.getElementById(
            'tabela-admin-corpo'
        );

        tabela.innerHTML =
        ultimos10.map(p=>`

        <tr>

        <td>

        ${p.hora || "-"}

        </td>

        <td>

        <b>

        📍 ${
            p.endereco?.rua ||

            p.endereco?.local ||

            "Local desconhecido"
        }

        </b>

        <br>

        🏘️ ${
            p.endereco?.bairro || ""
        }

        <br>

        🏙️ ${
            p.endereco?.cidade || ""
        }

        </td>

        <td style="
        color:#00d5ff;
        font-weight:bold;
        ">

        ${
            p.velocidade || 0
        } km/h

        </td>

        </tr>

        `).join('');
    });
}

// ── Monitorar conexão do navegador para capturar pontos offline ──
// O transmissor deve chamar window.registrarPontoGPS(ponto)
// quando tentar enviar um ponto sem conexão.
// Aqui ficamos ouvindo o evento customizado "gps:ponto-offline"
// que o transmissor pode disparar na mesma página/app.

window.addEventListener('gps:ponto-offline', (e)=>{
    const ponto = e.detail;
    if(ponto && ponto.timestamp){
        adicionarPontoOffline(ponto);
    }
});

// Exposto globalmente para o transmissor chamar diretamente
window.registrarPontoOffline = function(ponto){
    adicionarPontoOffline(ponto);
};

// ── Ao recuperar conexão, tenta sincronizar ──
window.addEventListener('online', ()=>{
    const seletor = document.getElementById('seletorVeiculo');
    sincronizarFilaOffline(seletor.value);
});

window.addEventListener(
'DOMContentLoaded',()=>{

    const seletor =
    document.getElementById(
        'seletorVeiculo'
    );

    // carregar fila offline salva anteriormente
    atualizarIndicadorOffline();
    renderizarListaOffline();

    monitorarVeiculo(
        seletor.value
    );
});

</script>
