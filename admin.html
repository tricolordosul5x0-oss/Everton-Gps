<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Everton GPS PRO</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

:root{
    --primary:#00d5ff;
    --bg:#121212;
    --card:#1d1d1d;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:var(--card);
    padding:15px;
    border-bottom:2px solid var(--primary);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.2em;
    font-weight:bold;
}

#map{
    flex-grow:1;
}

.painel{
    background:var(--card);
    padding:15px;
    display:grid;
    grid-template-columns:1fr 1.5fr;
    gap:15px;
    height:320px;
    overflow:auto;
}

.card{
    background:#252525;
    border-radius:10px;
    padding:15px;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    border-bottom:1px solid #333;
    padding-bottom:5px;
}

.badge{
    background:#4caf50;
    padding:4px 12px;
    border-radius:20px;
}

.badge.off{
    background:#f44336;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:.85em;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}

th{
    color:var(--primary);
    background:#151515;
    position:sticky;
    top:0;
}

.popup-info{
    line-height:1.7;
}

@media(max-width:700px){

    .painel{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
🛰️ Everton GPS PRO
</div>

<select id="seletorVeiculo"
style="
padding:10px;
background:#222;
color:white;
border:1px solid var(--primary);
border-radius:5px;
">

<option value="VEICULO-01">
VEICULO-01
</option>

</select>

</header>

<div id="map"></div>

<div class="painel">

<div class="card">

<h3 style="margin-top:0;color:#00d5ff">
Status do Veículo
</h3>

<div class="info">
<span>Veículo:</span>
<span id="info-id">-</span>
</div>

<div class="info">
<span>Status:</span>
<span id="info-conexao" class="badge off">
Offline
</span>
</div>

<div class="info">
<span>Velocidade:</span>
<span id="info-vel">
0 km/h
</span>
</div>

<div class="info">
<span>Precisão:</span>
<span id="info-precisao">
-
</span>
</div>

<div class="info">
<span>Atualização:</span>
<span id="info-hora">
-
</span>
</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Hora</th>

<th>Local</th>

<th>Vel.</th>

</tr>

</thead>

<tbody id="tabela-admin-corpo">

<tr>

<td colspan="3"
style="text-align:center;color:#777">

Aguardando dados...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    query,
    limitToLast
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {

    apiKey:
    "AIzaSyDwKIS8wL3D7OuaysVFWz3D7Oua",

    authDomain:
    "everton-gps.firebaseapp.com",

    databaseURL:
    "https://everton-gps-default-rtdb.firebaseio.com",

    projectId:
    "everton-gps",

    storageBucket:
    "everton-gps.appspot.com",

    messagingSenderId:
    "688936933095",

    appId:
    "1:688936933095:web:5508a8e1008f1b4020a1db"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let map;
let marcadorVeiculo;
let linhaPercurso;
let ultimaRota = [];

const carroIcone = L.icon({

    iconUrl:
    'https://cdn-icons-png.flaticon.com/512/744/744465.png',

    iconSize:[42,42],

    iconAnchor:[21,21]
});

function initMap(){

    map = L.map('map').setView(
        [-23.5505,-46.6333],
        15
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);
}

initMap();

function distanciaMetros(
lat1,lon1,
lat2,lon2){

    const R = 6371e3;

    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;

    const Δφ =
    (lat2-lat1) * Math.PI/180;

    const Δλ =
    (lon2-lon1) * Math.PI/180;

    const a =

    Math.sin(Δφ/2) *
    Math.sin(Δφ/2)

    +

    Math.cos(φ1) *
    Math.cos(φ2)

    *

    Math.sin(Δλ/2) *
    Math.sin(Δλ/2);

    const c =

    2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R*c;
}

async function desenharLinhaTempoReal(listaPontos){

    if(listaPontos.length < 2)
        return;

    try{

        const pontosReduzidos =
        listaPontos.filter((_,i)=>

            i % 5 === 0 ||

            i === listaPontos.length-1
        );

        const coordenadas =
        pontosReduzidos.map(p=>

            `${p.lon},${p.lat}`
        ).join(';');

        const url =

        `https://router.project-osrm.org/route/v1/driving/${coordenadas}?overview=full&geometries=geojson`;

        const resposta =
        await fetch(url);

        const dados =
        await resposta.json();

        if(
            !dados.routes ||
            !dados.routes.length
        ) return;

        const rota =
        dados.routes[0]
        .geometry.coordinates;

        const latlngs =
        rota.map(c=>[
            c[1],
            c[0]
        ]);

        ultimaRota = latlngs;

        if(linhaPercurso){

            linhaPercurso.setLatLngs(
                latlngs
            );

        }else{

            linhaPercurso =
            L.polyline(latlngs,{

                color:'#00ff00',

                weight:6,

                opacity:1,

                smoothFactor:1

            }).addTo(map);
        }

    }catch(e){

        console.log(
            "Erro rota:",
            e
        );

        if(
            ultimaRota.length &&
            linhaPercurso
        ){

            linhaPercurso.setLatLngs(
                ultimaRota
            );
        }
    }
}

function monitorarVeiculo(idVeiculo){

    document.getElementById(
        'info-id'
    ).innerText = idVeiculo;

    const atualRef =
    ref(
        db,
        `veiculos/${idVeiculo}/atual`
    );

    onValue(atualRef,
    (snapshot)=>{

        const dados =
        snapshot.val();

        if(!dados) return;

        const pos = [
            dados.lat,
            dados.lon
        ];

        if(!marcadorVeiculo){

            marcadorVeiculo =
            L.marker(pos,{
                icon:carroIcone
            }).addTo(map);

        }else{

            marcadorVeiculo
            .setLatLng(pos);
        }

        marcadorVeiculo.bindPopup(`

        <div class="popup-info">

        🚗 <b>${idVeiculo}</b><br><br>

        📍 <b>Rua:</b>
        ${
            dados.endereco?.rua ||
            "Não identificada"
        }<br>

        🏘️ <b>Bairro:</b>
        ${
            dados.endereco?.bairro ||
            "-"
        }<br>

        🏙️ <b>Cidade:</b>
        ${
            dados.endereco?.cidade ||
            "-"
        }<br><br>

        🚗 <b>Velocidade:</b>
        ${
            dados.velocidade || 0
        } km/h<br>

        🛰️ <b>Precisão:</b>
        ${
            dados.acuracia || "-"
        }m

        </div>

        `);

        document.getElementById(
            'info-conexao'
        ).innerText = "Online";

        document.getElementById(
            'info-conexao'
        ).className = "badge";

        document.getElementById(
            'info-hora'
        ).innerText =
        dados.hora || "-";

        document.getElementById(
            'info-vel'
        ).innerText =
        (dados.velocidade || 0)
        + " km/h";

        document.getElementById(
            'info-precisao'
        ).innerText =
        dados.acuracia + "m";

        map.flyTo(pos, 17, {
            duration:1.5
        });
    });

    const historicoRef =
    query(
        ref(
            db,
            `veiculos/${idVeiculo}/historico`
        ),
        limitToLast(2000)
    );

    onValue(historicoRef,
    async(snapshot)=>{

        const dados =
        snapshot.val();

        if(!dados) return;

        const agora = Date.now();

        let listaPontos =

        Object.values(dados)

        .filter(p =>

            agora - p.timestamp
            <= 86400000
        )

        .sort((a,b)=>

            a.timestamp -
            b.timestamp
        );

        const pontosFiltrados = [];

        for(
            let i=0;
            i<listaPontos.length;
            i++
        ){

            const atual =
            listaPontos[i];

            const anterior =
            listaPontos[i-1];

            if(!anterior){

                pontosFiltrados.push(atual);
                continue;
            }

            const distancia =
            distanciaMetros(

                anterior.lat,
                anterior.lon,

                atual.lat,
                atual.lon
            );

            if(
                distancia < 120
            ){

                pontosFiltrados.push(atual);
            }
        }

        await desenharLinhaTempoReal(
            pontosFiltrados
        );

        const ultimos10 =
        [...listaPontos]

        .reverse()

        .slice(0,10);

        const tabela =
        document.getElementById(
            'tabela-admin-corpo'
        );

        tabela.innerHTML =
        ultimos10.map(p=>`

        <tr>

        <td>

        ${p.hora || "-"}

        </td>

        <td>

        <b>

        📍 ${
            p.endereco?.rua ||

            p.endereco?.local ||

            "Local desconhecido"
        }

        </b>

        <br>

        🏘️ ${
            p.endereco?.bairro || ""
        }

        <br>

        🏙️ ${
            p.endereco?.cidade || ""
        }

        </td>

        <td style="
        color:#00d5ff;
        font-weight:bold;
        ">

        ${
            p.velocidade || 0
        } km/h

        </td>

        </tr>

        `).join('');
    });
}

window.addEventListener(
'DOMContentLoaded',()=>{

    const seletor =
    document.getElementById(
        'seletorVeiculo'
    );

    monitorarVeiculo(
        seletor.value
    );
});

</script>

</body>
</html>
