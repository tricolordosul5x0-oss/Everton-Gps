<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Everton GPS - Painel Admin</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<style>

:root{
    --primary:#00bcd4;
    --bg:#1a1a1a;
    --card:#2d2d2d;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:white;
    overflow:hidden;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:var(--card);
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--primary);
}

.logo{
    font-size:1.2em;
    font-weight:bold;
}

#map{
    flex-grow:1;
    width:100%;
}

.painel-inferior{
    background:var(--card);
    padding:15px;
    display:grid;
    grid-template-columns:1fr 1.5fr;
    gap:15px;
    height:280px;
    overflow-y:auto;
}

.card-status{
    background:#222;
    padding:15px;
    border-radius:8px;
    border-left:4px solid var(--primary);
}

.info-linha{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    border-bottom:1px solid #333;
    padding-bottom:4px;
    font-size:.85em;
}

.badge{
    background:#4caf50;
    color:white;
    padding:2px 8px;
    border-radius:12px;
    font-size:.8em;
}

.badge.offline{
    background:#f44336;
}

.tabela-container{
    background:#222;
    border-radius:8px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
    text-align:left;
    font-size:.85em;
}

th{
    background:#151515;
    color:var(--primary);
    position:sticky;
    top:0;
}

.leaflet-routing-container{
    display:none !important;
}

@media(max-width:600px){

    .painel-inferior{
        grid-template-columns:1fr;
        height:350px;
    }
}

</style>

</head>

<body>

<div class="container">

<header>

    <div class="logo">
        🖥️ Everton GPS - Admin
    </div>

    <select id="seletorVeiculo"
        style="
            padding:8px;
            background:#222;
            color:white;
            border:1px solid var(--primary);
            border-radius:4px;
        ">

        <option value="VEICULO-01">
            Veículo 01
        </option>

    </select>

</header>

<div id="map"></div>

<div class="painel-inferior">

    <div class="card-status">

        <h3>Status da Telemetria</h3>

        <div class="info-linha">
            <span>Veículo:</span>
            <span id="info-id">VEICULO-01</span>
        </div>

        <div class="info-linha">
            <span>Conexão:</span>
            <span id="info-conexao"
                  class="badge offline">
                Offline
            </span>
        </div>

        <div class="info-linha">
            <span>Última Atualização:</span>
            <span id="info-hora">-</span>
        </div>

        <div class="info-linha">
            <span>Velocidade:</span>
            <span id="info-vel"
                  style="color:#00bcd4;">
                0 km/h
            </span>
        </div>

        <div class="info-linha">
            <span>Precisão GPS:</span>
            <span id="info-precisao">-</span>
        </div>

    </div>

    <div class="tabela-container">

        <table>

            <thead>

                <tr>
                    <th>Horário</th>
                    <th>Últimos Lugares</th>
                    <th>Velocidade</th>
                </tr>

            </thead>

            <tbody id="tabela-admin-corpo">

                <tr>
                    <td colspan="3"
                        style="
                            text-align:center;
                            color:#777;
                        ">
                        Aguardando dados...
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    query,
    limitToLast
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {

    apiKey:"SUA_API_KEY",

    authDomain:"everton-gps.firebaseapp.com",

    databaseURL:
    "https://everton-gps-default-rtdb.firebaseio.com",

    projectId:"everton-gps",

    storageBucket:"everton-gps.appspot.com",

    messagingSenderId:"688936933095",

    appId:
    "1:688936933095:web:5508a8e1008f1b4020a1db"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let map;
let marcadorVeiculo;
let controleRota;
let primeiraCarga = true;

function initMap(){

    map = L.map('map').setView(
        [-23.5505,-46.6333],
        13
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);
}

function desenharRotaReal(listaPontos){

    if(listaPontos.length < 2)
        return;

    if(controleRota){

        map.removeControl(controleRota);
    }

    const waypoints = listaPontos
        .slice()
        .reverse()
        .map(p =>
            L.latLng(p.lat,p.lon)
        );

    controleRota = L.Routing.control({

        waypoints:waypoints,

        routeWhileDragging:false,

        addWaypoints:false,

        draggableWaypoints:false,

        fitSelectedRoutes:false,

        show:false,

        lineOptions:{
            styles:[{
                color:'#00bcd4',
                opacity:0.9,
                weight:5
            }]
        },

        createMarker:() => null

    }).addTo(map);
}

function monitorarVeiculo(idVeiculo){

    document.getElementById('info-id')
        .innerText = idVeiculo;

    const atualRef = ref(
        db,
        `veiculos/${idVeiculo}/atual`
    );

    onValue(atualRef,(snapshot)=>{

        const dados = snapshot.val();

        if(!dados) return;

        const pos = [
            dados.lat,
            dados.lon
        ];

        const vel =
            dados.velocidade ??
            dados.speed ??
            0;

        if(!marcadorVeiculo){

            marcadorVeiculo =
                L.marker(pos)
                .addTo(map);

        }else{

            marcadorVeiculo
                .setLatLng(pos);
        }

        if(primeiraCarga){

            map.setView(pos,16);

            primeiraCarga = false;
        }

        document.getElementById(
            'info-conexao'
        ).innerText = "Online";

        document.getElementById(
            'info-conexao'
        ).className = "badge";

        document.getElementById(
            'info-hora'
        ).innerText =
            dados.hora || "-";

        document.getElementById(
            'info-vel'
        ).innerText =
            vel + " km/h";

        document.getElementById(
            'info-precisao'
        ).innerText =
            (
                dados.acuracia ||
                dados.accuracy ||
                0
            ) + "m";
    });

    const historicoRef = query(

        ref(
            db,
            `veiculos/${idVeiculo}/historico`
        ),

        limitToLast(50)
    );

    onValue(historicoRef,(snapshot)=>{

        const dados = snapshot.val();

        if(!dados) return;

        const listaPontos =
            Object.values(dados);

        listaPontos.sort(
            (a,b)=>
                b.timestamp - a.timestamp
        );

        // REMOVE REPETIDOS
        const locaisUnicos = [];

        const locaisVisitados =
            new Set();

        for(const p of listaPontos){

            const bairro =
                p.endereco?.bairro || "";

            const cidade =
                p.endereco?.cidade || "";

            const rua =
                p.endereco?.rua || "";

            const chave =
                `${bairro}-${cidade}-${rua}`;

            if(locaisVisitados.has(chave))
                continue;

            locaisVisitados.add(chave);

            locaisUnicos.push(p);

            if(locaisUnicos.length >= 10)
                break;
        }

        // DESENHA ROTA
        desenharRotaReal(locaisUnicos);

        // TABELA
        const tabela =
            document.getElementById(
                'tabela-admin-corpo'
            );

        tabela.innerHTML =
            locaisUnicos.map(p=>`

            <tr>

                <td>
                    ${p.hora || "-"}
                </td>

                <td>

                    <b style="
                        color:#00bcd4;
                    ">

                        📍 ${
                            p.endereco?.bairro ||
                            p.endereco?.rua ||
                            "Local desconhecido"
                        }

                    </b>

                    <br>

                    <small>

                        ${
                            p.endereco?.cidade ||
                            "-"
                        }

                        ${
                            p.endereco?.estado ||
                            ""
                        }

                    </small>

                </td>

                <td style="
                    color:#00bcd4;
                    font-weight:bold;
                ">

                    ${
                        p.velocidade ??
                        p.speed ??
                        0
                    } km/h

                </td>

            </tr>

        `).join('');
    });
}

window.addEventListener(
    'DOMContentLoaded',
    ()=>{

    initMap();

    const seletor =
        document.getElementById(
            'seletorVeiculo'
        );

    monitorarVeiculo(
        seletor.value
    );

    seletor.addEventListener(
        'change',
        (e)=>{

        primeiraCarga = true;

        if(marcadorVeiculo){

            map.removeLayer(
                marcadorVeiculo
            );
        }

        if(controleRota){

            map.removeControl(
                controleRota
            );
        }

        marcadorVeiculo = null;
        controleRota = null;

        monitorarVeiculo(
            e.target.value
        );
    });
});

</script>

</body>
</html>
