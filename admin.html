<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everton GPS - Painel Admin</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        :root{
            --primary:#00bcd4;
            --bg:#1a1a1a;
            --card:#2d2d2d;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            background:var(--bg);
            color:white;
            overflow:hidden;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        .container{
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        header{
            background:var(--card);
            padding:15px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid var(--primary);
            z-index:1000;
        }

        .logo{
            font-size:1.2em;
            font-weight:bold;
            display:flex;
            align-items:center;
            gap:10px;
        }

        #map{
            flex-grow:1;
            width:100%;
            background:#222;
        }

        .painel-inferior{
            background:var(--card);
            padding:15px;
            display:grid;
            grid-template-columns:1fr 1.5fr;
            gap:15px;
            height:280px;
            overflow-y:auto;
            border-top:1px solid #444;
        }

        .card-status{
            background:#222;
            padding:15px;
            border-radius:8px;
            border-left:4px solid var(--primary);
        }

        .card-status h3{
            margin-top:0;
            color:var(--primary);
        }

        .info-linha{
            display:flex;
            justify-content:space-between;
            margin-bottom:8px;
            font-size:.85em;
            border-bottom:1px solid #333;
            padding-bottom:4px;
        }

        .info-linha span:last-child{
            font-weight:bold;
        }

        .tabela-container{
            background:#222;
            border-radius:8px;
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:400px;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #333;
            font-size:.85em;
            text-align:left;
        }

        th{
            background:#151515;
            color:var(--primary);
            position:sticky;
            top:0;
        }

        .badge{
            background:#4caf50;
            color:white;
            padding:2px 8px;
            border-radius:12px;
            font-size:.8em;
        }

        .badge.offline{
            background:#f44336;
        }

        @media(max-width:600px){

            .painel-inferior{
                grid-template-columns:1fr;
                height:350px;
            }

            .logo{
                font-size:1em;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <header>

        <div class="logo">
            🖥️ Everton GPS - Admin
        </div>

        <select id="seletorVeiculo"
                style="
                    padding:8px;
                    background:#222;
                    color:white;
                    border:1px solid var(--primary);
                    border-radius:4px;
                ">

            <option value="VEICULO-01">
                Veículo 01
            </option>

        </select>

    </header>

    <div id="map"></div>

    <div class="painel-inferior">

        <div class="card-status">

            <h3>Status da Telemetria</h3>

            <div class="info-linha">
                <span>Veículo:</span>
                <span id="info-id">VEICULO-01</span>
            </div>

            <div class="info-linha">
                <span>Conexão:</span>
                <span id="info-conexao" class="badge offline">
                    Offline
                </span>
            </div>

            <div class="info-linha">
                <span>Última Atualização:</span>
                <span id="info-hora">-</span>
            </div>

            <div class="info-linha">
                <span>Velocidade:</span>
                <span id="info-vel"
                      style="color:#00bcd4;">
                    0 km/h
                </span>
            </div>

            <div class="info-linha">
                <span>Precisão GPS:</span>
                <span id="info-precisao">-</span>
            </div>

        </div>

        <div class="tabela-container">

            <table>

                <thead>
                    <tr>
                        <th>Horário</th>
                        <th>Local / Cidade</th>
                        <th>Velocidade</th>
                    </tr>
                </thead>

                <tbody id="tabela-admin-corpo">

                    <tr>
                        <td colspan="3"
                            style="
                                text-align:center;
                                color:#777;
                            ">
                            Aguardando dados...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    query,
    limitToLast
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {

    apiKey: "SUA_API_KEY",

    authDomain: "everton-gps.firebaseapp.com",

    databaseURL:
        "https://everton-gps-default-rtdb.firebaseio.com",

    projectId: "everton-gps",

    storageBucket: "everton-gps.appspot.com",

    messagingSenderId: "688936933095",

    appId:
        "1:688936933095:web:5508a8e1008f1b4020a1db"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let map;
let rotaLinha;
let marcadorVeiculo;
let primeiraCarga = true;

function initMap(){

    map = L.map('map').setView(
        [-23.5505, -46.6333],
        13
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OpenStreetMap'
        }
    ).addTo(map);

    rotaLinha = L.polyline([],{
        color:'#00bcd4',
        weight:5,
        opacity:0.9
    }).addTo(map);
}

async function desenharRotaReal(listaPontos){

    if(listaPontos.length < 2) return;

    try{

        const coordenadas = listaPontos
            .slice()
            .reverse()
            .map(p => `${p.lon},${p.lat}`)
            .join(';');

        const url =
            `https://router.project-osrm.org/route/v1/driving/${coordenadas}?overview=full&geometries=geojson`;

        const resposta = await fetch(url);

        const dados = await resposta.json();

        if(!dados.routes || !dados.routes.length)
            return;

        const rota =
            dados.routes[0].geometry.coordinates;

        const latLngs = rota.map(
            p => [p[1], p[0]]
        );

        rotaLinha.setLatLngs(latLngs);

    }catch(erro){

        console.error(
            "Erro ao desenhar rota:",
            erro
        );

        rotaLinha.setLatLngs(
            listaPontos.map(
                p => [p.lat, p.lon]
            ).reverse()
        );
    }
}

function monitorarVeiculo(idVeiculo){

    document.getElementById('info-id')
        .innerText = idVeiculo;

    const atualRef = ref(
        db,
        `veiculos/${idVeiculo}/atual`
    );

    onValue(atualRef,(snapshot)=>{

        const dados = snapshot.val();

        if(!dados) return;

        const pos = [dados.lat, dados.lon];

        const vel =
            dados.velocidade ??
            dados.speed ??
            0;

        if(!marcadorVeiculo){

            marcadorVeiculo =
                L.marker(pos).addTo(map);

        }else{

            marcadorVeiculo.setLatLng(pos);
        }

        marcadorVeiculo.bindPopup(`
            <b>${idVeiculo}</b><br>
            🚗 ${vel} km/h
        `);

        if(primeiraCarga){

            map.setView(pos,16);
            primeiraCarga = false;
        }

        document.getElementById('info-conexao')
            .innerText = "Online";

        document.getElementById('info-conexao')
            .className = "badge";

        document.getElementById('info-hora')
            .innerText = dados.hora || "-";

        document.getElementById('info-vel')
            .innerText = vel + " km/h";

        document.getElementById('info-precisao')
            .innerText =
                (dados.acuracia ||
                 dados.accuracy ||
                 0) + "m";
    });

    const historicoRef = query(
        ref(
            db,
            `veiculos/${idVeiculo}/historico`
        ),
        limitToLast(10)
    );

    onValue(historicoRef,
        async(snapshot)=>{

        const dados = snapshot.val();

        if(!dados) return;

        const listaPontos =
            Object.values(dados);

        listaPontos.sort(
            (a,b)=>
                b.timestamp - a.timestamp
        );

        await desenharRotaReal(listaPontos);

        const tabela =
            document.getElementById(
                'tabela-admin-corpo'
            );

        tabela.innerHTML =
            listaPontos.map(p=>`

            <tr>

                <td>
                    ${p.hora || "-"}
                </td>

                <td>

                    <small>
                        📍 ${
                            p.endereco?.rua ||
                            "Local Desconhecido"
                        }
                    </small>

                    <br>

                    <b>
                        🏙️ ${
                            p.endereco?.cidade || "-"
                        }
                    </b>

                </td>

                <td style="
                    color:#00bcd4;
                    font-weight:bold;
                ">

                    ${
                        p.velocidade ??
                        p.speed ??
                        0
                    } km/h

                </td>

            </tr>

        `).join('');
    });
}

window.addEventListener(
    'DOMContentLoaded',
    ()=>{

    initMap();

    const seletor =
        document.getElementById(
            'seletorVeiculo'
        );

    monitorarVeiculo(seletor.value);

    seletor.addEventListener(
        'change',
        (e)=>{

        primeiraCarga = true;

        if(marcadorVeiculo)
            map.removeLayer(
                marcadorVeiculo
            );

        marcadorVeiculo = null;

        rotaLinha.setLatLngs([]);

        monitorarVeiculo(
            e.target.value
        );
    });
});

</script>

</body>
</html>
